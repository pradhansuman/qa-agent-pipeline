name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: E2E – Chromium
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy

    steps:
      # ── Checkout ───────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node setup ─────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ───────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Run tests ──────────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test --workers=4 --retries=1
        env:
          CI: true

      # ── Upload HTML report on failure ──────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # ── Upload test screenshots / traces ───────────────────────────
      - name: Upload test results (traces + screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      # ── Summary badge in PR ────────────────────────────────────────
      - name: Add test summary
        if: always()
        run: |
          echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} = "success" ]; then
            echo "| ✅ Passed | All tests passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ❌ Failed | See artifact for HTML report |" >> $GITHUB_STEP_SUMMARY
          fi
