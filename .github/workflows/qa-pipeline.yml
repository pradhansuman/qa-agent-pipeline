name: AI-Assisted QA Pipeline

on:
  issues:
    types: [labeled]

jobs:
  qa:
    if: github.event.label.name == 'qa-ready'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        run: apt-get update && apt-get install -y python3 python3-pip

      - name: Install deps
        run: pip3 install -r requirements.txt && npm i -D @playwright/test allure-playwright

      - name: Run QA pipeline (real Playwright)
        id: qa
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -m orchestrator.pipeline \
            "${{ github.repository }}" \
            "${{ github.event.issue.number }}" \
            --token "$GH_TOKEN" --real \
            | tee pipeline_output.txt
          # surface the gate decision for the gate step
          grep -q "Gate: PASS" pipeline_output.txt && echo "gate=pass" >> "$GITHUB_OUTPUT" || echo "gate=fail" >> "$GITHUB_OUTPUT"

      - name: Publish Allure report to Pages
        if: always()
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: .qa-workspace/allure-results
          gh_pages: gh-pages
          allure_report: allure-report

      - name: Comment results on issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('pipeline_output.txt','utf8');
            const body = out.split('\n').slice(-12).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### AI-Assisted QA result\n```\n' + body + '\n```'
            });

      - name: Enforce merge gate
        if: steps.qa.outputs.gate == 'fail'
        run: echo "::error::QA gate FAILED — P0 failure or pass rate < 90%" && exit 1
